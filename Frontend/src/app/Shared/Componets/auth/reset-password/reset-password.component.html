<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔑 Reset Password</h1>
      <p>Enter your new password below.</p>
    </div>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Success Message -->
      <div *ngIf="successMessage" class="alert alert-success">
        <i class="fa-solid fa-circle-check"></i>
        {{ successMessage }}
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-error">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ errorMessage }}
      </div>

      <!-- New Password Field -->
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="newPassword"
            formControlName="newPassword"
            placeholder="Enter new password"
            [class.error]="newPassword?.invalid && newPassword?.touched"
          />
          <i
            class="fa-solid toggle-password"
            [class.fa-eye]="!showPassword"
            [class.fa-eye-slash]="showPassword"
            (click)="togglePasswordVisibility('password')"
          ></i>
        </div>
        <div *ngIf="newPassword?.invalid && newPassword?.touched" class="error-message">
          <span *ngIf="newPassword?.errors?.['required']">Password is required</span>
          <span *ngIf="newPassword?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            id="confirmPassword"
            formControlName="confirmPassword"
            placeholder="Confirm new password"
            [class.error]="confirmPassword?.invalid && confirmPassword?.touched"
          />
          <i
            class="fa-solid toggle-password"
            [class.fa-eye]="!showConfirmPassword"
            [class.fa-eye-slash]="showConfirmPassword"
            (click)="togglePasswordVisibility('confirmPassword')"
          ></i>
        </div>
        <div *ngIf="confirmPassword?.invalid && confirmPassword?.touched" class="error-message">
          <span *ngIf="confirmPassword?.errors?.['required']">Please confirm your password</span>
          <span *ngIf="confirmPassword?.errors?.['passwordMismatch']">Passwords do not match</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-submit" [disabled]="isLoading || !token || !email">
        <span *ngIf="!isLoading">
          <i class="fa-solid fa-check"></i>
          Reset Password
        </span>
        <span *ngIf="isLoading">
          <i class="fa-solid fa-spinner fa-spin"></i>
          Resetting...
        </span>
      </button>

      <!-- Back to Login -->
      <div class="auth-footer">
        <p>
          <a routerLink="/login" class="link">Back to Login</a>
        </p>
      </div>
    </form>
  </div>
</div>
