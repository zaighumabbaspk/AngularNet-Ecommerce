<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 *ngIf="isVerifying">⏳ Verifying Email...</h1>
      <h1 *ngIf="!isVerifying && isSuccess">Email Verified!</h1>
      <h1 *ngIf="!isVerifying && !isSuccess"> Verification Failed</h1>
    </div>

    <div class="auth-content">
      <!-- Loading -->
      <div *ngIf="isVerifying" class="loading">
        <div class="spinner"></div>
        <p>Please wait while we verify your email...</p>
      </div>

      <!-- Success -->
      <div *ngIf="!isVerifying && isSuccess" class="success-message">
        <div class="icon-success">✓</div>
        <p class="message-text">{{ message }}</p>
        <p class="redirect-message">Redirecting to login page in 3 seconds...</p>
        <a routerLink="/login" class="btn-primary">Go to Login Now</a>
      </div>

      <!-- Error -->
      <div *ngIf="!isVerifying && !isSuccess" class="error-message">
        <div class="icon-error">✕</div>
        <p class="message-text">{{ message }}</p>
        <button (click)="resendVerification()" class="btn-secondary">
          Resend Verification Email
        </button>
        <a routerLink="/login" class="link">Back to Login</a>
      </div>
    </div>
  </div>
</div>
