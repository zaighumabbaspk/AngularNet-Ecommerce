<div *ngIf="showHero" class="hero-header">
  <!-- Background Image -->
  <img src="back.png" alt="Modern Furniture" class="hero-bg" />

  <!-- Hero Text Overlay -->
  <div class="hero-text">
    <h1>Transform Your Space with Timeless Elegance</h1>
    <p>Discover modern furniture crafted with luxury, comfort, and style.</p>
    <button class="btn btn-dark px-4 py-2 mt-3">Shop Now</button>
  </div>
</div>

<header [class.glass-navbar]="!isDarkBackground" [class.glass-navbar-dark]="isDarkBackground" class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <!-- Brand -->
      <a routerLink="/" class="navbar-brand">LuxeLiving</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenu"
        aria-controls="navbarMenu"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-center" id="navbarMenu">
        <ul class="navbar-nav mb-2 mb-lg-0 text-center">
          <li class="nav-item"><a routerLink="/" class="nav-link active">Home</a></li>
          <li class="nav-item"><a href="javascript:void(0)" (click)="scrollToProducts()" class="nav-link">Products</a></li>
          <li class="nav-item"><a routerLink="/search" class="nav-link">Search</a></li>
          <li class="nav-item"><a routerLink="/about" class="nav-link">About Us</a></li>
        </ul>
      </div>

      <!-- Search Bar (Full Width when opened) -->
      <!-- <div class="search-bar-wrapper" *ngIf="searchOpen">
        <button class="close-search-btn"  title="Close search">
          <i class="fas fa-xmark"></i>
        </button>
        <app-search-autocomplete></app-search-autocomplete>
      </div> -->

          <div class="d-flex align-items-center ms-auto gap-3">
        <!-- Search Autocomplete -->
        <div class="navbar-autocomplete-wrapper">
          <app-search-autocomplete></app-search-autocomplete>
        </div>

    
        <div class="auth-section-login" *ngIf="(authService.authState$ | async) as authState">
          <ng-container *ngIf="!authState.isAuthenticated">
            <a routerLink="/login" class="btn-auth btn-login">Login</a>
            <a routerLink="/signup" class="btn-auth btn-signup">Sign Up</a>
          </ng-container>
        </div>



        <!-- Cart Icon -->
        <div class="cart-icon-wrapper" *ngIf="(authService.authState$ | async) as authState">
          <ng-container *ngIf="authState.isAuthenticated">
            <button class=" cart-btn" (click)="openCartDrawer()" title="View Cart">
              <i class="fa-solid fa-cart-plus"></i>
              <span class="cart-badge" *ngIf="(cartService.cart$ | async) as cart">
                {{ cart?.totalItems || 0 }}
              </span>
            </button>
          </ng-container>
        </div>
                 <!-- Wishlist Icon -->
        <div class="wishlist-icon-wrapper" *ngIf="(authService.authState$ | async) as authState">
          <ng-container *ngIf="authState.isAuthenticated">
            <button class="wishlist-btn" routerLink="/wishlist" title="My Wishlist">
              <i class="fa-solid fa-heart"></i>
              <span class="wishlist-badge" *ngIf="(wishlist$ | async) as wishlist">
                {{ wishlist?.data?.items?.length || 0 }}
              </span>
            </button>
          </ng-container>
        </div>

        <!-- User Menu Icon -->
        <div class="user-menu-wrapper" *ngIf="(authService.authState$ | async) as authState">
          <ng-container *ngIf="authState.isAuthenticated">
            <button class="header-icon user-icon-btn" (click)="toggleUserMenu()" title="Account Menu">
              <i class="fa-solid fa-user"></i>
            </button>


            <!-- User Menu Dropdown -->
            <div class="user-menu-dropdown" *ngIf="userMenuOpen">
              <div class="user-menu-header">
                <div class="user-avatar">
                  <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-info">
                  <p class="user-name">{{ authState.user?.fullName }}</p>
                  <p class="user-email">{{ authState.user?.email }}</p>
                </div>
              </div>

              <div class="user-menu-divider"></div>

              <div class="user-menu-items">
                <a routerLink="/orders" class="user-menu-item" (click)="closeUserMenu()">
                  <i class="fa-solid fa-box"></i>
                  <span>My Orders</span>
                </a>
                <button class="user-menu-item logout-item" (click)="logout()">
                  <i class="fa-solid fa-right-from-bracket"></i>
                  <span>Logout</span>
                </button>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
    </div>

  </header>
