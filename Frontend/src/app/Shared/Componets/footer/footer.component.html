<footer class="footer">
  <div class="container py-5">
    <div class="row">

      <!-- About -->
      <div class="col-lg-4 col-md-6 mb-4">
        <h5 class="footer-title">About Us</h5>
        <p class="footer-text">
          We are committed to delivering high-quality products
          and seamless shopping experiences.
        </p>
      </div>

      <!-- Quick Links -->
      <div class="col-lg-4 col-md-6 mb-4">
        <h5 class="footer-title">Quick Links</h5>
        <ul class="footer-links">
          <li><a routerLink="/">Home</a></li>
          <li><a routerLink="/products">Shop</a></li>
          <li><a routerLink="/blog">Blog</a></li>
          <li><a routerLink="/contact">Contact</a></li>
        </ul>
      </div>

      <!-- Contact -->
      <div class="col-lg-4 col-md-12 mb-4">
        <h5 class="footer-title">Contact</h5>
        <p class="footer-text">
          123 Technology Ave, Lahore, PK
        </p>
        <p class="footer-text">
         <a [href]="'mailto:' + 'support@example.com'">
          {{ 'support@example.com' }}
         </a>
        </p>
        <p class="footer-text">+92 42 1234 5678</p>
      </div>

    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="footer-bottom text-center py-3">
    © 2025 LuxeLiving. All Rights Reserved.
  </div>
</footer>
