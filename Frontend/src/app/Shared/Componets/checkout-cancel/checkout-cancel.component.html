<div class="cancel-container">
  <div class="cancel-card">
    <div class="cancel-icon">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </div>
    
    <h1>Payment Cancelled</h1>
    <p class="cancel-message">
      Your payment was cancelled. Don't worry, no charges were made to your account.
      You can try again or continue shopping.
    </p>
    
    <div class="action-buttons">
      <button class="btn btn-primary" (click)="goToCart()">
        Back to Cart
      </button>
      <button class="btn btn-secondary" (click)="continueShopping()">
        Continue Shopping
      </button>
    </div>
  </div>
</div>
