trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Frontend/*
      - Backend/*

variables:
  azureSubscription: 'azure-subscription-connection'   # your service connection name
  backendAppName: 'ecommerce-prod-api'                 # confirmed App Service name
  storageAccountName: 'ecommerceprodstore'             # confirmed Storage account name
  buildConfiguration: 'Release'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build_Backend
  displayName: 'Build Backend (.NET)'
  jobs:
  - job: BuildBackend
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: 'Backend/**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: 'Backend/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'Backend/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/backend'
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/backend'
        ArtifactName: 'backend-drop'

- stage: Build_Frontend
  displayName: 'Build Frontend (Angular)'
  dependsOn: []
  jobs:
  - job: BuildFrontend
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'

    - script: |
        cd Frontend
        npm ci
      displayName: 'npm install'

    - script: |
        cd Frontend
        npm run build -- --configuration production
      displayName: 'ng build --prod'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'Frontend/dist'
        ArtifactName: 'frontend-drop'

- stage: Deploy_Backend
  displayName: 'Deploy Backend'
  dependsOn: Build_Backend
  condition: succeeded()
  jobs:
  - deployment: DeployBackend
    pool:
      vmImage: $(vmImageName)
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(backendAppName)'
              package: '$(Pipeline.Workspace)/backend-drop/**/*.zip'

- stage: Deploy_Frontend
  displayName: 'Deploy Frontend'
  dependsOn: Build_Frontend
  condition: succeeded()
  jobs:
  - deployment: DeployFrontend
    pool:
      vmImage: $(vmImageName)
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: 'Upload Angular build to $web container'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                SOURCE_DIR=$(find "$(Pipeline.Workspace)/frontend-drop" -maxdepth 3 -type d -iname "browser" | head -n 1)
                if [ -z "$SOURCE_DIR" ]; then
                  SOURCE_DIR="$(Pipeline.Workspace)/frontend-drop/dist"
                fi
                echo "Uploading from: $SOURCE_DIR"

                az storage blob upload-batch \
                  --account-name $(storageAccountName) \
                  --destination '$web' \
                  --source "$SOURCE_DIR" \
                  --overwrite \
                  --auth-mode login

          - task: AzureCLI@2
            displayName: 'Set cache-control headers'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az storage blob update \
                  --account-name $(storageAccountName) \
                  --container-name '$web' \
                  --name index.html \
                  --content-cache-control "no-cache" \
                  --auth-mode login