trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Backend/*
    exclude:
      - Frontend/*

variables:
  azureSubscription: 'azure-subscription-connection'
  backendAppName: 'ecommerce-prod-api'
  buildConfiguration: 'Release'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build_Backend
  displayName: 'Build Backend (.NET)'
  jobs:
  - job: BuildBackend
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: 'Backend/**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: 'Backend/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'Backend/eCommerce.Host/eCommerce.Host.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/backend'
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/backend'
        ArtifactName: 'backend-drop'

- stage: Deploy_Backend
  displayName: 'Deploy Backend'
  dependsOn: Build_Backend
  condition: succeeded()
  jobs:
  - deployment: DeployBackend
    pool:
      vmImage: $(vmImageName)
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(backendAppName)'
              package: '$(Pipeline.Workspace)/backend-drop/**/*.zip'
